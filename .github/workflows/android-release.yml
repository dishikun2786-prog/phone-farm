name: Android Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.0.0)'
        required: true
      release_notes:
        description: 'Release notes'
        required: false
        default: ''

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android-client/app/release.keystore

      - name: Build release APK
        working-directory: android-client
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Zipalign APK
        run: |
          $ANDROID_HOME/build-tools/35.0.0/zipalign -v -p 4 \
            android-client/app/build/outputs/apk/release/app-release-unsigned.apk \
            android-client/app/build/outputs/apk/release/phonefarm-release.apk

      - name: Sign APK (v2 + v3)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner sign \
            --ks android-client/app/release.keystore \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            android-client/app/build/outputs/apk/release/phonefarm-release.apk

      - name: Verify signature
        run: |
          $ANDROID_HOME/build-tools/35.0.0/apksigner verify \
            android-client/app/build/outputs/apk/release/phonefarm-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android-client/app/build/outputs/apk/release/phonefarm-release.apk
          retention-days: 30

      - name: Generate version name
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PhoneFarm v${{ steps.version.outputs.version }}
          body: ${{ inputs.release_notes || 'Release build from tag ${{ github.ref_name }}' }}
          files: android-client/app/build/outputs/apk/release/phonefarm-release.apk
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: testers
          file: android-client/app/build/outputs/apk/release/phonefarm-release.apk

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Run MobSF scan
        uses: MobSF/mobsf-action@v1
        with:
          input: phonefarm-release.apk
          scan-type: apk

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-scan
          path: mobsf-report.pdf
          retention-days: 30

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-release, security-scan]
    if: always()
    steps:
      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL }}
            text: ":white_check_mark: PhoneFarm Android Release ${{ github.ref_name }} built and signed successfully."

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL }}
            text: ":x: PhoneFarm Android Release ${{ github.ref_name }} failed. Check: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
