// ControlMessage — binary control protocol for scrcpy input injection.
// Replaces JSON text messages for touch/key/scroll/clipboard commands.
//
// Sent from browser to server via WebSocket, then relayed to device
// via ADB control socket. One message = one input event.
//
// Benefits over JSON:
//   - Fixed-size touch messages (no string keys)
//   - Native integer encoding (coordinates, keycodes)
//   - Group control metadata inline
//   - ~60% smaller than JSON equivalent

syntax = "proto3";

package phonefarm.control;

// A single control input from browser to device
message ControlMessage {
  // Type of control input
  oneof action {
    TouchEvent touch = 1;
    KeyEvent key = 2;
    ScrollEvent scroll = 3;
    ClipboardData clipboard = 4;
    KeymapCommand keymap = 5;
  }

  // Optional group broadcast target (empty = single device)
  string group_id = 10;
}

// Touch event (down/move/up)
message TouchEvent {
  enum Action {
    DOWN = 0;
    UP = 1;
    MOVE = 2;
  }
  Action action = 1;
  uint32 pointer_id = 2;
  float x = 3;
  float y = 4;
  float pressure = 5;
}

// Key event (keycode injection)
message KeyEvent {
  enum Action {
    DOWN = 0;
    UP = 1;
  }
  Action action = 1;
  uint32 keycode = 2;
}

// Scroll event
message ScrollEvent {
  float x = 1;
  float y = 2;
  int32 hscroll = 3;
  int32 vscroll = 4;
}

// Clipboard sync (browser → device)
message ClipboardData {
  string text = 1;
}

// Keymap engine converted command
message KeymapCommand {
  oneof cmd {
    KeymapTouch tap = 1;
    KeymapSwipe swipe = 2;
    KeymapTouch long_press = 3;
  }
}

message KeymapTouch {
  float x = 1;
  float y = 2;
  uint32 duration_ms = 3;
}

message KeymapSwipe {
  float from_x = 1;
  float from_y = 2;
  float to_x = 3;
  float to_y = 4;
  uint32 duration_ms = 5;
}

// Device status (heartbeat data)
message DeviceStatus {
  string device_id = 1;
  float battery = 2;
  string current_app = 3;
  bool screen_on = 4;
  int64 timestamp_ms = 5;
}

// Group control broadcast message (server → devices)
message GroupBroadcast {
  string group_id = 1;
  string source_device_id = 2;
  ControlMessage control = 3;
}
