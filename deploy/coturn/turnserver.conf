# =============================================================================
# coturn TURN/STUN Server Configuration
# PhoneFarm WebRTC Infrastructure
# =============================================================================
# This configuration provides NAT traversal for WebRTC P2P connections
# between PhoneFarm Android devices. STUN is used first (direct connection),
# with TURN as fallback relay when symmetric NAT prevents direct P2P.
#
# Security: production-ready with long-term credentials, fingerprint,
#           and bandwidth limits to prevent abuse.
# =============================================================================

# ---- Network ----

# Listening port for STUN/TURN traffic (UDP)
listening-port=3478

# TLS listening port for secure TURN (DTLS)
tls-listening-port=5349

# Bind to all IPv4 interfaces. Use a specific IP in production.
# Example: listening-ip=10.0.0.1
listening-ip=0.0.0.0

# External IP as seen by peers on the public internet.
# REPLACE WITH YOUR ACTUAL PUBLIC IP:
#   - Single IP: external-ip=203.0.113.45
#   - NAT mapping: external-ip=203.0.113.45/192.168.1.100
external-ip=CHANGE_ME

# ---- Fingerprint ----

# Include a fingerprint in TURN messages to detect modification
# by middleboxes (firewalls/NAT). Strongly recommended for reliability.
fingerprint

# ---- Authentication ----

# Use long-term credential mechanism (username + password)
# More secure than short-term credentials for persistent installations.
lt-cred-mech

# Server realm (used for digest authentication)
realm=phonefarm.io

# User database: at least one user must be configured.
# Format: user=<username>:<password>
# IMPORTANT: Change this password before deploying to production!
user=phonefarm:CHANGE_ME_PASSWORD

# Uncomment to use a dedicated user database file
#userdb=/etc/turnuserdb.conf

# ---- Performance ----

# Disable TCP relay to enforce UDP-only operation
# UDP provides lower latency for real-time screen sharing
# Enable this only if your network blocks UDP (rare)
no-tcp-relay

# Maximum number of server relay threads (0 = auto-detect from CPU count)
# Set explicitly to limit resource usage
relay-threads=4

# Bandwidth limits per session (bits per second)
# These prevent a single device from consuming excessive bandwidth
# 2 Mbps per session is sufficient for 720p-1080p screen sharing
bps-capacity=4000000
total-quota=0

# Stale nonce timeout (seconds)
stale-nonce=600

# Mobility: force ICE to re-gather candidates on IP change
# Useful for devices switching between WiFi and mobile data
mobility

# ---- Security ----

# Disable the telnet CLI interface (production safety)
no-cli

# Prevent TURN allocation from being used as a DDoS amplifier
# by enforcing a strict username/password check before allocating
no-loopback-peers
no-multicast-peers

# Deny connections to private/RFC1918 IP address ranges
# Prevents the TURN server from being used to probe internal networks
# Uncomment in production:
#denied-peer-ip=10.0.0.0-10.255.255.255
#denied-peer-ip=172.16.0.0-172.31.255.255
#denied-peer-ip=192.168.0.0-192.168.255.255

# ---- TLS / DTLS ----

# Path to certificate and private key for TLS/DTLS
# Generate with: openssl req -x509 -newkey rsa:4096 -nodes -keyout key.pem -out cert.pem -days 365
#cert=/etc/coturn/cert.pem
#pkey=/etc/coturn/key.pem

# Uncomment for production TLS:
#tls-listening-port=5349
#cipher-list="ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

# ---- Logging ----

# Log file path
log-file=/var/log/coturn/turnserver.log

# Verbose logging (comment out in production to reduce noise)
#verbose

# Enable detailed allocation/deallocation logging for debugging
#Uncomment for troubleshooting:
#Verbose

# ---- Process ----

# PID file for service management
#pidfile=/var/run/turnserver.pid

# Run as an unprivileged user after binding to ports
# (ports < 1024 require root initially, then drop privileges)
#proc-user=coturn
#proc-group=coturn

# ---- Advanced ----

# Maximum allocation lifetime (seconds). Default 3600 (1 hour).
# PhoneFarm sessions are typically < 30 min, but allow 1 hour.
max-allocate-lifetime=3600

# The following WebRTC-specific options ensure compatibility:
# - ICE nomination: aggressive (faster connection)
# - STUN keep-alive: every 25 seconds to maintain NAT bindings
# - Channel binding: supported for lower overhead data relay
