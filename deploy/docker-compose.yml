version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: phonefarm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: phonefarm
      POSTGRES_PASSWORD: phonefarm_secret
      POSTGRES_DB: phonefarm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: phonefarm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-secret}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"

  control-server:
    build: ../control-server
    container_name: phonefarm-server
    restart: unless-stopped
    environment:
      PORT: "8443"
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://phonefarm:phonefarm_secret@postgres:5432/phonefarm"
      REDIS_URL: "redis://default:${REDIS_PASSWORD:-redis-secret}@redis:6379"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      DEVICE_AUTH_TOKEN: "${DEVICE_AUTH_TOKEN:-device-auth-token-change-me}"
      UDP_RELAY_PORT: "8444"
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8443:8443"
      - "8444:8444/udp"

  nginx:
    image: nginx:alpine
    container_name: phonefarm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../dashboard/dist:/usr/share/nginx/html:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - control-server

volumes:
  pgdata:
  redisdata:
  redisdata:
