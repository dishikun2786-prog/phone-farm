---
# Control Server Deployment — Fastify/TypeScript HTTP + WebSocket app
# Multi-replica for HA with anti-affinity spread across nodes
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonefarm-control-server
  labels:
    app.kubernetes.io/name: control-server
    app.kubernetes.io/component: api
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: control-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-server
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: phonefarm-control-server
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      affinity:
        # Spread replicas across nodes for HA
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: control-server
                topologyKey: kubernetes.io/hostname
            # Also spread across availability zones when available
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: control-server
                topologyKey: topology.kubernetes.io/zone
        nodeAffinity:
          # Prefer nodes in the application tier pool
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              preference:
                matchExpressions:
                  - key: phonefarm.io/node-pool
                    operator: In
                    values:
                      - application
      containers:
        - name: control-server
          image: phonefarm/control-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: udp-relay
              containerPort: 8444
              protocol: UDP
          env:
            - name: NODE_ENV
              value: "production"
          envFrom:
            - configMapRef:
                name: phonefarm-config
            - secretRef:
                name: phonefarm-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          # Health probes
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Graceful shutdown initiated at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                    # Signal Node.js to drain connections gracefully
                    kill -SIGTERM 1
                    sleep 25
          volumeMounts:
            - name: episodes
              mountPath: /app/data/episodes
            - name: logs
              mountPath: /app/logs
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
      volumes:
        - name: episodes
          emptyDir:
            sizeLimit: 2Gi
        - name: logs
          emptyDir:
            sizeLimit: 1Gi

---
# Pod Disruption Budget — ensure at least 1 replica is always available
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: phonefarm-control-server-pdb
  labels:
    app.kubernetes.io/name: control-server
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-server

---
# ServiceAccount for the control server
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phonefarm-control-server
  labels:
    app.kubernetes.io/name: control-server
