---
# Edge Node Deployment — Go service for on-premise device management
# GPU-accelerated AI inference workloads with NVIDIA T4 support
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonefarm-edge-node
  labels:
    app.kubernetes.io/name: edge-node
    app.kubernetes.io/component: edge
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-node
        app.kubernetes.io/component: edge
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: phonefarm-edge-node
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: edge-node
              topologyKey: kubernetes.io/hostname
        nodeAffinity:
          # Require GPU nodes for AI workloads
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cloud.google.com/gke-accelerator
                    operator: In
                    values:
                      - nvidia-tesla-t4
                      - nvidia-tesla-a100
                      - nvidia-tesla-v100
      tolerations:
        # Allow scheduling on GPU-tainted nodes
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: edge-node
          image: phonefarm/edge-node:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
            - name: metrics
              containerPort: 9091
              protocol: TCP
          env:
            - name: GO_ENV
              value: "production"
          envFrom:
            - configMapRef:
                name: phonefarm-config
            - secretRef:
                name: phonefarm-secrets
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4000m"
              memory: "4Gi"
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Edge node draining at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
                    kill -SIGTERM 1
                    sleep 25
          volumeMounts:
            - name: model-cache
              mountPath: /app/models
            - name: logs
              mountPath: /app/logs
            - name: nvidia-driver
              mountPath: /usr/local/nvidia
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
      volumes:
        - name: model-cache
          emptyDir:
            sizeLimit: 10Gi
        - name: logs
          emptyDir:
            sizeLimit: 2Gi
        - name: nvidia-driver
          hostPath:
            path: /usr/local/nvidia
            type: Directory

---
# Pod Disruption Budget for edge nodes
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: phonefarm-edge-node-pdb
  labels:
    app.kubernetes.io/name: edge-node
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-node

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phonefarm-edge-node
  labels:
    app.kubernetes.io/name: edge-node
