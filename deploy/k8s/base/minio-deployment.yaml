---
# MinIO Distributed Deployment — S3-compatible object storage
# 4-node distributed setup with 4 drives per node (simulated for single-zone)
# Production should use at least 4 physical nodes in different failure domains
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: phonefarm-minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
spec:
  serviceName: phonefarm-minio-headless
  replicas: 4
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: storage
    spec:
      terminationGracePeriodSeconds: 30
      serviceAccountName: phonefarm-minio
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: minio
              topologyKey: kubernetes.io/hostname
      initContainers:
        # Init container to create phonefarm bucket on startup
        - name: create-buckets
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: phonefarm-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: phonefarm-secrets
                  key: MINIO_SECRET_KEY
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MinIO to be ready..."
              until mc alias set local http://localhost:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD 2>/dev/null; do
                echo "MinIO not ready, retrying in 3s..."
                sleep 3
              done
              echo "MinIO is ready. Creating buckets..."
              mc mb --ignore-existing local/phonefarm
              mc mb --ignore-existing local/phonefarm-screenshots
              mc mb --ignore-existing local/phonefarm-logs
              mc mb --ignore-existing local/phonefarm-models
              echo "Setting lifecycle policies..."
              # Screenshots: expire after 7 days
              mc ilm import local/phonefarm-screenshots <<SCREENS
              {
                "Rules": [
                  {
                    "ID": "expire-7d",
                    "Status": "Enabled",
                    "Expiration": { "Days": 7 }
                  }
                ]
              }
              SCREENS
              # Logs: expire after 30 days
              mc ilm import local/phonefarm-logs <<LOGS
              {
                "Rules": [
                  {
                    "ID": "expire-30d",
                    "Status": "Enabled",
                    "Expiration": { "Days": 30 }
                  }
                ]
              }
              LOGS
              # Models: keep latest 3 versions
              mc ilm import local/phonefarm-models <<MODELS
              {
                "Rules": [
                  {
                    "ID": "keep-3-versions",
                    "Status": "Enabled",
                    "NoncurrentVersionExpiration": { "NoncurrentDays": 7 }
                  }
                ]
              }
              MODELS
              echo "Buckets and lifecycle policies configured successfully."
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-01-01T00-00-00Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --address
            - ":9000"
            - --console-address
            - ":9001"
            # Distributed mode: 4 nodes, each with exported PVC path
            - http://phonefarm-minio-{0...3}.phonefarm-minio-headless.$(POD_NAMESPACE).svc.cluster.local/data
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: phonefarm-secrets
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: phonefarm-secrets
                  key: MINIO_SECRET_KEY
            - name: MINIO_PROMETHEUS_AUTH_TYPE
              value: "public"
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: s3-api
              containerPort: 9000
              protocol: TCP
            - name: console
              containerPort: 9001
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: minio-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
  volumeClaimTemplates:
    - metadata:
        name: minio-data
        labels:
          app.kubernetes.io/name: minio
          app.kubernetes.io/component: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
        storageClassName: standard

---
# Headless Service for MinIO distributed cluster DNS discovery
apiVersion: v1
kind: Service
metadata:
  name: phonefarm-minio-headless
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: storage
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3-api
      port: 9000
      targetPort: 9000
      protocol: TCP
    - name: console
      port: 9001
      targetPort: 9001
      protocol: TCP

---
# ServiceAccount for MinIO
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phonefarm-minio
  labels:
    app.kubernetes.io/name: minio
