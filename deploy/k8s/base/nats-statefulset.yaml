---
# NATS StatefulSet — JetStream-enabled messaging with persistent storage
# 3-node cluster for HA with automatic failover
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: phonefarm-nats
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
spec:
  serviceName: phonefarm-nats-headless
  replicas: 3
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/component: messaging
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: phonefarm-nats
      securityContext:
        fsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: nats
              topologyKey: kubernetes.io/hostname
      initContainers:
        - name: wait-for-dns
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for headless service DNS to resolve..."
              until nslookup phonefarm-nats-headless.${POD_NAMESPACE}.svc.cluster.local; do
                echo "DNS not ready, retrying in 2s..."
                sleep 2
              done
              echo "DNS resolved successfully"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          args:
            - "--config"
            - "/etc/nats/nats.conf"
            - "--cluster_name"
            - "phonefarm-nats"
            - "--cluster"
            - "nats://0.0.0.0:6222"
            - "--routes"
            - "nats://phonefarm-nats-0.phonefarm-nats-headless.$(POD_NAMESPACE).svc.cluster.local:6222,nats://phonefarm-nats-1.phonefarm-nats-headless.$(POD_NAMESPACE).svc.cluster.local:6222,nats://phonefarm-nats-2.phonefarm-nats-headless.$(POD_NAMESPACE).svc.cluster.local:6222"
            - "--jetstream"
            - "--store_dir"
            - "/data"
            - "--http_port"
            - "8222"
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: client
              containerPort: 4222
              protocol: TCP
            - name: cluster
              containerPort: 6222
              protocol: TCP
            - name: monitor
              containerPort: 8222
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: nats-config
              mountPath: /etc/nats
              readOnly: true
            - name: nats-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
      volumes:
        - name: nats-config
          configMap:
            name: nats-config
  volumeClaimTemplates:
    - metadata:
        name: nats-data
        labels:
          app.kubernetes.io/name: nats
          app.kubernetes.io/component: storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
        storageClassName: standard

---
# NATS configuration ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: messaging
data:
  nats.conf: |
    # NATS Server Configuration - PhoneFarm Cluster
    port: 4222
    http_port: 8222

    # Cluster configuration
    cluster {
      name: phonefarm-nats
      port: 6222

      # Routes are set via command-line args to use DNS names

      authorization {
        user: phonefarm
        password: $NATS_TOKEN
        timeout: 5
      }
    }

    # JetStream storage configuration
    jetstream {
      max_memory_store: 256MB
      max_file_store: 10GB
      store_dir: /data

      # Limits
      max_memory: 64MB
      max_bytes: 10GB
    }

    # Monitoring
    http {
      port: 8222
    }

---
# ServiceAccount for NATS
apiVersion: v1
kind: ServiceAccount
metadata:
  name: phonefarm-nats
  labels:
    app.kubernetes.io/name: nats
