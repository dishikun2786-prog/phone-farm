---
# Production resource limit overrides — more generous for prod workloads
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonefarm-control-server
spec:
  template:
    spec:
      containers:
        - name: control-server
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "4000m"
              memory: "4Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonefarm-edge-node
spec:
  template:
    spec:
      containers:
        - name: edge-node
          resources:
            requests:
              cpu: "2000m"
              memory: "2Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "8000m"
              memory: "8Gi"
              nvidia.com/gpu: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: phonefarm-python-ai
spec:
  template:
    spec:
      containers:
        - name: python-ai
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "8000m"
              memory: "16Gi"
