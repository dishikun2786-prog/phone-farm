# 本地控制服务器 — 全栈部署 + VPS 桥接
#
# 手机设备 → 公网 VPS → 桥接隧道 → 本机 :8443
# Dashboard → 本机 :5173 (开发) 或 nginx :80 (生产)
#
# 启动前确保 VPS 中继已运行，并设置正确的 BRIDGE_RELAY_URL
#
# 启动: docker compose up -d

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: phonefarm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: phonefarm
      POSTGRES_PASSWORD: phonefarm_secret
      POSTGRES_DB: phonefarm
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: phonefarm-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-secret}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"

  control-server:
    build: ../../control-server
    container_name: phonefarm-server
    restart: unless-stopped
    environment:
      PORT: "8443"
      HOST: "0.0.0.0"
      DATABASE_URL: "postgresql://phonefarm:phonefarm_secret@postgres:5432/phonefarm"
      REDIS_URL: "redis://default:${REDIS_PASSWORD:-redis-secret}@redis:6379"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      DEVICE_AUTH_TOKEN: "${DEVICE_AUTH_TOKEN:-device-auth-token-change-me}"
      UDP_RELAY_PORT: "8444"
      # ── VPS 桥接配置 ──
      BRIDGE_RELAY_URL: "${BRIDGE_RELAY_URL:-ws://your-vps-ip:80/ws/control}"
      BRIDGE_CONTROL_TOKEN: "${BRIDGE_CONTROL_TOKEN:-control-token-change-me}"
    depends_on:
      - postgres
      - redis
    ports:
      - "8443:8443"
      - "8444:8444/udp"

  nginx:
    image: nginx:alpine
    container_name: phonefarm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../dashboard/dist:/usr/share/nginx/html:ro
    depends_on:
      - control-server

volumes:
  pgdata:
  redisdata:
