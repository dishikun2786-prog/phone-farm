# PhoneFarm NATS Configuration
# Place this file at: /etc/nats/nats-server.conf

# Server identity
server_name = "phonefarm-hub"
host = "0.0.0.0"
port = 4222

# HTTP monitoring (for health checks and metrics)
http_port = 8222
http_base_path = "/"

# Clustering (uncomment and configure for multi-node NATS)
# cluster {
#   name = "phonefarm-cluster"
#   listen = "0.0.0.0:6222"
#   routes = [
#     "nats://phonefarm-nats-0.phonefarm-nats:6222",
#     "nats://phonefarm-nats-1.phonefarm-nats:6222",
#     "nats://phonefarm-nats-2.phonefarm-nats:6222",
#   ]
# }

# Authentication
authorization {
  # Control server token (full access)
  token = "${NATS_TOKEN:-phonefarm-nats-token-change-me}"

  # Device tokens (limited publish/subscribe)
  users = [
    {
      user = "control-server"
      password = "${NATS_CONTROL_PASSWORD:-control-password-change-me}"
      permissions = {
        publish = {
          allow = [
            "phonefarm.device.>",
            "phonefarm.task.>",
            "phonefarm.health",
          ]
        }
        subscribe = {
          allow = [
            "phonefarm.device.>",
            "phonefarm.task.>",
            "phonefarm.health",
          ]
        }
      }
    },
    {
      user = "device"
      password = "${NATS_DEVICE_PASSWORD:-device-password-change-me}"
      permissions = {
        publish = {
          allow = [
            "phonefarm.device.${NATS_DEVICE_ID:-*}.online",
            "phonefarm.device.${NATS_DEVICE_ID:-*}.offline",
            "phonefarm.device.${NATS_DEVICE_ID:-*}.heartbeat",
            "phonefarm.task.*.status",
            "phonefarm.health",
          ]
        }
        subscribe = {
          allow = [
            "phonefarm.device.${NATS_DEVICE_ID:-*}.action",
            "phonefarm.task.>",
            "phonefarm.health",
          ]
        }
      }
    }
  ]
}

# JetStream (persistent state)
jetstream {
  store_dir = "/data/nats/jetstream"
  max_memory_store = 1GB
  max_file_store = 10GB

  # Key-Value store for device state
  # Created programmatically by control-server:
  #   nats kv add phonefarm-state --history 5 --ttl 5m
}

# Limits
max_connections = 10000
max_control_line = 4096
max_payload = 8MB
write_deadline = "10s"

# Logging
debug = false
trace = false
logtime = true
log_file = "/var/log/nats/nats-server.log"

