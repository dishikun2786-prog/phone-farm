# PhoneFarm VPS Relay — 生产 Nginx 配置
# 域名: phone.openedskill.com  IP: 47.243.254.248
#
# 部署步骤:
#   1. 替换 C:\nginx-1.26.3\conf\nginx.conf 为本文件
#   2. 放置 SSL 证书到 C:\nginx-1.26.3\ssl\
#   3. nginx -t && nginx -s reload

events {
    worker_connections 2048;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # 日志
    access_log logs/access.log;
    error_log logs/error.log;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # WebSocket 超时
    proxy_read_timeout 86400;
    proxy_connect_timeout 30;

    # ── HTTP → HTTPS 重定向 ──
    server {
        listen 80;
        server_name phone.openedskill.com;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS 主服务 ──
    server {
        listen 443 ssl;
        http2 on;
        server_name phone.openedskill.com;

        # SSL 证书 (Let's Encrypt 或自签名)
        ssl_certificate ssl/fullchain.pem;
        ssl_certificate_key ssl/privkey.pem;

        # SSL 安全配置
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── REST API 代理 (后续扩展) ──
        location /api/ {
            proxy_pass http://127.0.0.1:8499;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket: 手机设备入口 ──
        location /ws/phone {
            proxy_pass http://127.0.0.1:8499;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket: Dashboard 前端入口 ──
        location /ws/frontend {
            proxy_pass http://127.0.0.1:8499;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── WebSocket: 本地控制服务器隧道 ──
        location /ws/control {
            proxy_pass http://127.0.0.1:8499;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── AI 协同: DeepSeek Worker 接入点 ──
        location /ws/ai/worker {
            proxy_pass http://127.0.0.1:8499;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── AI 协同: Claude Code CLI 接入点 ──
        location /ws/ai/control {
            proxy_pass http://127.0.0.1:8499;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── AI 统计 ──
        location /api/v1/ai/ {
            proxy_pass http://127.0.0.1:8499;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ── 健康检查 ──
        location /health {
            proxy_pass http://127.0.0.1:8499/api/v1/relay/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
